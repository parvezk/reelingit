name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: lint / typecheck / test / build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Each step below runs across all workspaces that define the script.
      # `--if-present` skips workspaces that don't declare it, so stub apps
      # don't fail CI before they've added their tooling.
      - name: Lint
        run: pnpm -r --if-present run lint

      - name: Typecheck
        run: pnpm -r --if-present run typecheck

      - name: Test
        run: pnpm -r --if-present run test

      - name: Build
        run: pnpm -r --if-present run build
